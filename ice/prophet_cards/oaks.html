<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallin H. Oaks</title>
    <style>
        /* Insert styles here, this is called an internal stylesheet  */
        body{
            background: #FFECD7;
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Helvetica, Arial, sans-serif;
            }

        .prophet-card {
            background: #008DB1;
            border: 4px solid #004E63;
            border-radius: 28px;

            width: 340px;
            padding: 28px 22px;

            text-align: center;
            }

        h1{
            margin: 0;
            color: #FFFFFF;
            font-size: 44px;
            font-weight: 700;
            line-height: 1.05;
            }

        .subtitle{
            display: block;
            margin-top: 10px;

            color: #91E4FB;
            text-decoration: none;
            font-size: 16px;
            line-height: 1.2;
            }

        .subtitle:hover{
            text-decoration: underline;
            }

        .prophet-card img{
            display: block;
            width: 230px;
            margin: 18px auto 14px;
            border: 6px solid #FFFFFF;
            }

        ul{
            list-style: disc;
            display: inline-block;
            text-align: left;

            margin: 0;
            padding-left: 22px;

            color: #FFFFFF;
            font-size: 18px;
            }

        .quote{
            margin-top: 18px;
            color: #FFD783;
            font-family: "Brush Script MT", "Nanum Brush Script", cursive;
            font-size: 22px;
            line-height: 1.2;
            }

    </style>
</head>
<body>
    <div class="prophet-card">
            <header>
                <h1>Dallin H. Oaks</h1>
                <a class="subtitle" href="https://churchofjesuschrist.org" target="_blank">
                    18th President of The Church of Jesus Christ of Latter-day Saints
                </a>

            </header>
    
    <!-- Insert HTML elements here -->
     <img src="images/oaks.webp" alt="oaks picture" />
    <ul>
        <li><strong>Born:</strong> Aug 12, 1932</li>
        <li><strong>Apostle:</strong> Apr 7, 1984</li>
        <li><strong>Prophet:</strong> Oct 14, 2025</li>
    </ul>

<p class="quote">
  “The only permanent solution to the differences that divide us is to follow our Savior’s teachings and to gradually become even as He is.”
</p>

    <div>
</body>
</html>
