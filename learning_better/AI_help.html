<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Layout Challenge</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .container {
      /* YOUR JOB:
         Make the page layout work */
         display: grid;
         grid-template-columns: 200px 1fr;
    }

    header {
        grid-column: 1/3;
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    aside {
      background-color: #d9d9d9;
      padding: 20px;
    }

    main {
      background-color: white;
      padding: 20px;
    }

    .cards {
      /* YOUR JOB:
         Make these cards go in a row */
        display: flex;
        gap: 15px;
    }

    .card {
      background-color: #e8e8e8;
      padding: 20px;
      border: 2px solid #bbb;
    }

    footer {
        grid-column: 1/3;
        background-color: #333;
        color: white;
        text-align: center;
        padding: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>My Layout Challenge</h1>
    </header>

    <aside>
      <h2>Sidebar</h2>
      <p>Home</p>
      <p>About</p>
      <p>Contact</p>
    </aside>

    <main>
      <h2>Main Content</h2>
      <p>This is where the main content goes.</p>

      <div class="cards">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
      </div>
    </main>

    <footer>
      <p>Footer</p>
    </footer>
  </div>

</body>
</html>
